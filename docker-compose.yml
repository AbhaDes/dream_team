version: '3.8'

services:
  web:
  build: .
  ports: 
  - "8080:8080"
  depends_on:
  - db

  #The PostgreSQL container
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: abhadeshpande
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: dream-team
    ports:
      - "5432:5432"
    volumes:
      - my_data: /var/lib/postgresql/data
volumes:
  my_data:

  